name: Publish to NPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@f2a'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish core package
        run: npm publish --access public --provenance

  publish-adapter:
    runs-on: ubuntu-latest
    needs: publish-core
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@f2a'
      
      - name: Install dependencies
        run: npm install
      
      - name: Wait for package to be available
        run: sleep 30
      
      - name: Update adapter dependency
        working-directory: packages/openclaw-adapter
        run: npm install @f2a/network@latest --save
      
      - name: Build adapter
        working-directory: packages/openclaw-adapter
        run: npm run build
      
      - name: Publish adapter package
        working-directory: packages/openclaw-adapter
        run: npm publish --access public