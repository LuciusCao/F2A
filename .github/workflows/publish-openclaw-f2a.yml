name: Publish OpenClaw F2A to NPM

on:
  push:
    tags:
      - 'openclaw-f2a@v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      
      # 复制 openclaw-f2a 到独立目录（避免 workspace 链接）
      - run: |
          mkdir -p /tmp/openclaw-f2a-publish
          cp -r packages/openclaw-f2a/* /tmp/openclaw-f2a-publish/
          cp packages/openclaw-f2a/.npmignore /tmp/openclaw-f2a-publish/ 2>/dev/null || true
          # 复制 @f2a/network 作为依赖（解决 tsconfig references 问题）
          mkdir -p /tmp/openclaw-f2a-publish/node_modules/@f2a
          cp -r packages/network /tmp/openclaw-f2a-publish/node_modules/@f2a/network
      
      # 在独立目录安装依赖
      - run: npm install
        working-directory: /tmp/openclaw-f2a-publish
      
      # build
      - run: npm run build
        working-directory: /tmp/openclaw-f2a-publish
      
      # 发布
      - run: npm publish
        working-directory: /tmp/openclaw-f2a-publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
