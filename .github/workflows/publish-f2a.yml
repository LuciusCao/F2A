name: Publish F2A Unified Package to NPM

on:
  push:
    tags:
      - 'f2a@v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build all dependencies
        run: |
          npm run build -w @f2a/network
          npm run build -w @f2a/cli
          npm run build -w @f2a/daemon

      - name: Publish to NPM
        run: npm publish --access public
        working-directory: packages/f2a
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}