name: Publish to NPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build --if-present
      - run: npm test
      - run: npm publish --access public

  publish-adapter:
    runs-on: ubuntu-latest
    needs: publish-core
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Wait for package to be available
        run: sleep 30
      
      - name: Update adapter dependency
        working-directory: packages/openclaw-adapter
        run: npm install @f2a/network@latest --save
      
      - run: npm ci
        working-directory: packages/openclaw-adapter
      
      - run: npm run build --if-present
        working-directory: packages/openclaw-adapter
      
      - run: npm publish --access public
        working-directory: packages/openclaw-adapter