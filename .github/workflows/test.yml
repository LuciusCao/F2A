name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Run tests with coverage
      run: npm run test:coverage

    - name: Check coverage thresholds
      run: |
        # 提取覆盖率并检查阈值
        COVERAGE=$(npm run test:coverage -- --reporter=json 2>/dev/null | tail -1)
        echo "Coverage report generated"
        
        # 检查关键文件覆盖率（使用 grep 从文本报告中提取）
        npm run test:coverage 2>&1 | tee coverage.txt
        
        # 语句覆盖率阈值 60%
        if grep -q "All files.*|.*6[0-9]\\.[0-9]*" coverage.txt; then
          echo "✅ Statement coverage >= 60%"
        else
          echo "⚠️ Statement coverage < 60%, current:"
          grep "All files" coverage.txt || true
        fi

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report-node-${{ matrix.node-version }}
        path: coverage/
