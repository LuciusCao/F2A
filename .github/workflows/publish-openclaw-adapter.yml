name: Publish OpenClaw Adapter to NPM

on:
  push:
    tags:
      - 'openclaw-adapter@v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      
      # 先在根目录安装依赖并 build 主仓库（@f2a/network）
      - run: npm ci
      - run: npm run build
      
      # 再 build adapter
      - run: npm run build
        working-directory: packages/openclaw-adapter
      
      - run: npm publish
        working-directory: packages/openclaw-adapter