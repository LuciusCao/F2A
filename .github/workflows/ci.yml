name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

# 测试层级说明：
# 1. unit-tests: 单元测试，mock 外部依赖，每个 PR 必跑
# 2. integration-tests: 真实 P2P 网络测试，每个 PR 必跑
# 3. docker-tests: Docker 容器测试，仅 main/develop push 时跑
# 4. stress-tests: 多节点压力测试，仅 main 分支 push 时跑

jobs:
  # 单元测试
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build core package
        run: npm run build --workspace=@f2a/network
      
      - name: Run lint
        run: npm run lint
      
      - name: Build all
        run: npm run build
      
      - name: Run unit tests
        run: npm run test:unit
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: hashFiles('./coverage/lcov.info') != ''
        with:
          files: ./coverage/lcov.info
          flags: unittests

  # 集成测试（真实 P2P 网络）
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build core package
        run: npm run build --workspace=@f2a/network
      
      - name: Build all
        run: npm run build
      
      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
      
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: |
            ~/.f2a/logs/
            /tmp/f2a-*/
          retention-days: 7

  # Docker 容器测试（仅 push 触发）
  docker-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build core package
        run: npm run build --workspace=@f2a/network
      
      - name: Build all
        run: npm run build
      
      - name: Run Docker tests
        run: npm run test:docker
      
      - name: Export logs on failure
        if: failure()
        run: docker compose -f packages/network/tests/docker/docker-compose.test.yml logs > docker-test-logs.txt
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-test-logs
          path: docker-test-logs.txt
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: docker

  # 压力测试（仅 main 分支 push 触发）
  stress-tests:
    runs-on: ubuntu-latest
    needs: docker-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build core package
        run: npm run build --workspace=@f2a/network
      
      - name: Build all
        run: npm run build
      
      - name: Run 10-node stress test
        run: npm run test:stress