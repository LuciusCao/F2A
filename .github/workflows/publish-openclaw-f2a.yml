name: Publish OpenClaw F2A to NPM

on:
  push:
    tags:
      - 'openclaw-f2a@v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      
      # 在根目录安装所有依赖（跳过 prepare scripts）
      - run: npm ci --ignore-scripts
      
      # build @f2a/network（确保 dist 存在）
      - run: npm run build
        working-directory: packages/core
      
      # 进入 openclaw-f2a 目录，安装依赖（使用已发布的 @f2a/network）
      # 设置环境变量跳过 workspace 链接
      - run: npm install --no-package-lock
        working-directory: packages/openclaw-f2a
        env:
          NPM_CONFIG_WORKSPACE_PACKAGES: ""
      
      # build openclaw-f2a
      - run: npm run build
        working-directory: packages/openclaw-f2a
      
      - run: npm publish
        working-directory: packages/openclaw-f2a