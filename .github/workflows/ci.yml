name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # Lint + 单元测试（合并）
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run lint
        run: npm run lint || npm run build -- --noEmit
      
      - name: Build
        run: npm run build
      
      - name: Run unit tests
        run: npm run test:unit
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests

  # E2E 测试（真实 P2P 网络）
  e2e-tests:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NODE_ENV: test
      
      - name: Upload E2E test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs
          path: |
            ~/.f2a/logs/
            /tmp/f2a-*/
          retention-days: 7

  # 集成测试（仅 push 触发，PR 时跳过但返回成功）
  integration-tests:
    runs-on: ubuntu-latest
    needs: e2e-tests
    steps:
      - name: Skip on PR
        if: github.event_name != 'push'
        run: |
          echo "Skipping integration tests on PR"
          exit 0

      - uses: actions/checkout@v4
        if: github.event_name == 'push'

      - uses: actions/setup-node@v4
        if: github.event_name == 'push'
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: github.event_name == 'push'
        run: npm install

      - name: Build
        if: github.event_name == 'push'
        run: npm run build

      - name: Run Docker integration tests
        if: github.event_name == 'push'
        run: npm run test:docker

      - name: Export logs on failure
        if: failure() && github.event_name == 'push'
        run: docker compose -f tests/docker/docker-compose.test.yml logs > test-logs.txt

      - name: Upload logs on failure
        if: failure() && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: test-logs.txt

      - name: Upload coverage
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: integration

  # 多节点测试（仅 main 分支 push 触发）
  multi-node-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Skip on non-main
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: |
          echo "Skipping multi-node tests"
          exit 0

      - uses: actions/checkout@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      - uses: actions/setup-node@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm install

      - name: Build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run build

      - name: Run 10-node test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run test:docker:10