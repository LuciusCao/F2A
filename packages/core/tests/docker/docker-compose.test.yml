# F2A Integration Test Environment
# 使用方式：
#   npm run test:docker           # 默认 3 个节点
#   npm run test:docker:10        # 10 个节点

services:
  # 引导节点（稳定，其他节点连接它）
  bootstrap:
    build:
      context: ../../..
      dockerfile: packages/core/tests/docker/Dockerfile.node
    networks:
      f2a-test-net:
        aliases:
          - bootstrap.f2a.local
    environment:
      - F2A_CONTROL_PORT=9001
      - F2A_P2P_PORT=9000
      - F2A_CONTROL_TOKEN=${TEST_TOKEN:-test-token-integration}
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9001/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # 动态生成的节点（使用 --scale 参数调整数量）
  node:
    build:
      context: ../../..
      dockerfile: packages/core/tests/docker/Dockerfile.node
    networks:
      - f2a-test-net
    environment:
      - F2A_CONTROL_PORT=9001
      - F2A_CONTROL_TOKEN=${TEST_TOKEN:-test-token-integration}
      - NODE_ENV=production
      - BOOTSTRAP_PEERS=/dns4/bootstrap.f2a.local/tcp/9000
    depends_on:
      bootstrap:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9001/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    # 注意：使用 docker compose up --scale node=N 来控制节点数量

  # 测试运行器
  test-runner:
    build:
      context: ../../..
      dockerfile: packages/core/tests/docker/Dockerfile.runner
    networks:
      - f2a-test-net
    environment:
      - RUN_INTEGRATION_TESTS=true
      - TEST_BOOTSTRAP_HTTP=http://bootstrap:9001
      - TEST_NODE_COUNT=${NODE_COUNT:-3}
      - TEST_TOKEN=${TEST_TOKEN:-test-token-integration}
    depends_on:
      bootstrap:
        condition: service_healthy
      node:
        condition: service_healthy
    volumes:
      - ../../../coverage:/app/coverage  # 导出覆盖率报告

networks:
  f2a-test-net:
    driver: bridge